<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Trails</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="controls">
    <label for="generationsInput" title="Number of generations to simulate.">Generations to run</label>
    <input id="generationsInput" type="number" min="1" value="10" title="Number of generations to simulate." />
    <label for="cullChanceInput" title="Chance for each live cell to die after a generation, from 0% to 0.10%. Set to 0 to disable culling.">Cull chance (%)</label>
    <input id="cullChanceInput" type="range" min="0" max="0.1" step="0.01" value="0" title="Chance for each live cell to die after a generation, from 0% to 0.10%. Set to 0 to disable culling." />
    <output id="cullChanceOutput" for="cullChanceInput">0%</output>
    <label for="sproutChanceInput" title="Chance for each empty cell to sprout after a generation, from 0% to 0.10%. Sprouts near viable life are more likely to form a 2×2 block. Set to 0 to disable spontaneous growth.">Sprout chance (%)</label>
    <input id="sproutChanceInput" type="range" min="0" max="0.1" step="0.01" value="0" title="Chance for each empty cell to sprout after a generation, from 0% to 0.10%. Sprouts near viable life are more likely to form a 2×2 block. Set to 0 to disable spontaneous growth." />
    <output id="sproutChanceOutput" for="sproutChanceInput">0%</output>
    <label for="patternInput" title="Choose a starting pattern for the grid.">Pattern</label>
    <select id="patternInput" title="Choose a starting pattern for the grid.">
      <option value="none">None</option>
      <option value="glider">Glider</option>
      <option value="pulsar">Pulsar</option>
      <option value="gosperGliderGun">Gosper Glider Gun</option>
    </select>
    <label for="paletteInput" title="Choose the color palette for live cells and trails.">Palette</label>
    <select id="paletteInput" title="Choose the color palette for live cells and trails.">
      <option value="rose">Rose</option>
      <option value="ocean">Ocean</option>
      <option value="forest">Forest</option>
      <option value="sunset">Sunset</option>
      <option value="violet">Violet</option>
    </select>
    <button id="runBtn" title="Run the simulation for the chosen number of generations.">Run Simulation</button>
    <button id="stopBtn" type="button" disabled title="Stop the current simulation and keep the current grid.">Stop</button>
    <button id="clearBtn" title="Reset the grid to the selected pattern, or a random board when None is selected.">Clear</button>
    <div class="counter" id="remainingCounter">Generations Remaining: 0</div>
  </div>

  <table id="lifeGrid" aria-label="Life Trails grid"></table>

  <script src="app.js"></script>
</body>
</html>
